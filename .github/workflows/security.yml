name: Security Audit

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Run cargo-audit
      run: cargo audit

    - name: Install cargo-deny
      run: cargo install cargo-deny

    - name: Run cargo-deny
      run: cargo deny check advisories

  sanitizers:
    name: Memory Sanitizers
    strategy:
      matrix:
        sanitizer: [address, leak, memory]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust nightly
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: rust-src

    - name: Run tests with ${{ matrix.sanitizer }} sanitizer
      run: |
        export RUSTFLAGS="-Z sanitizer=${{ matrix.sanitizer }}"
        export RUSTDOCFLAGS="-Z sanitizer=${{ matrix.sanitizer }}"
        cargo +nightly test -Z build-std --target x86_64-unknown-linux-gnu --all-features
      env:
        ASAN_OPTIONS: detect_leaks=1

  fuzz:
    name: Fuzz Testing
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust nightly
      uses: dtolnay/rust-toolchain@nightly

    - name: Install cargo-fuzz
      run: cargo install cargo-fuzz

    - name: Run fuzz tests
      run: |
        cd tests/fuzz
        cargo fuzz run fuzz_cipher -- -max_total_time=300
        cargo fuzz run fuzz_key -- -max_total_time=300
      continue-on-error: true
